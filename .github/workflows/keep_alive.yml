name: Keep Streamlit Alive

on:
  schedule:
    # 每天的 UTC 10:00 與 22:00 執行 (對應台灣時間 18:00 與 06:00)
    - cron: '0 10,22 * * *'
  workflow_dispatch:

jobs:
  ping-streamlit:
    runs-on: ubuntu-latest
    

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r "自動啟用/requirements.txt"
        
    - name: 安裝 Playwright 瀏覽器核心
      run: |
        python -m playwright install chromium

    - name: 執行喚醒腳本
      run: |
        python "自動啟用/keep_alive.py"
