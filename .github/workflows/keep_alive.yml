name: Keep Streamlit Alive

on:
  # 設定排程：這裡設定為每隔 1 天的 UTC 時間 00:00 執行一次
  schedule:
    - cron: '0 0 */1 * *'
  # 允許你隨時在 GitHub 網頁上手動點擊 "Run workflow" 來測試
  workflow_dispatch:

jobs:
  ping-streamlit:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 安裝 Playwright 瀏覽器核心
      run: |
        playwright install chromium

    - name: 執行喚醒腳本
      run: |
        python keep_alive.py
